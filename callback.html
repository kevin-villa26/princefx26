<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prince FX — Authenticating...</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #FFD700;
      --bg-dark: #050810;
      --text: #E8EAF0;
      --text-dim: #6B7280;
      --success: #10B981;
      --danger: #EF4444;
    }
    body {
      background: var(--bg-dark);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,215,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,215,0,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
    }
    .auth-box {
      text-align: center;
      position: relative;
      z-index: 1;
      padding: 40px;
    }
    .crown {
      font-size: 48px;
      filter: drop-shadow(0 0 20px var(--gold));
      margin-bottom: 16px;
      display: block;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); filter: drop-shadow(0 0 20px var(--gold)); }
      50% { transform: scale(1.05); filter: drop-shadow(0 0 40px var(--gold)); }
    }
    .title {
      font-family: 'Orbitron', monospace;
      font-size: 22px;
      color: var(--gold);
      letter-spacing: 3px;
      margin-bottom: 8px;
    }
    .status-msg {
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 32px;
      min-height: 20px;
      transition: all 0.3s;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(255,215,0,0.1);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .steps {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 320px;
      margin: 0 auto;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: rgba(255,215,0,0.03);
      border: 1px solid rgba(255,215,0,0.08);
      border-radius: 8px;
      font-size: 13px;
      color: var(--text-dim);
      text-align: left;
      transition: all 0.4s;
    }
    .step.active { color: var(--gold); border-color: rgba(255,215,0,0.3); background: rgba(255,215,0,0.06); }
    .step.done { color: var(--success); border-color: rgba(16,185,129,0.3); background: rgba(16,185,129,0.05); }
    .step.error { color: var(--danger); border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.05); }
    .step-icon { font-size: 16px; flex-shrink: 0; }
    .error-box {
      display: none;
      margin-top: 24px;
      padding: 16px;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 10px;
      font-size: 13px;
      color: var(--danger);
      font-family: 'Share Tech Mono', monospace;
      max-width: 400px;
    }
    .btn-retry {
      margin-top: 20px;
      padding: 10px 24px;
      background: linear-gradient(135deg, #FFD700, #D97706);
      border: none;
      border-radius: 8px;
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #050810;
      cursor: pointer;
      display: none;
    }
  </style>
</head>
<body>
<div class="auth-box">
  <span class="crown">👑</span>
  <h1 class="title">PRINCE FX</h1>
  <div class="status-msg" id="statusMsg">Authenticating with Deriv...</div>
  <div class="spinner" id="spinner"></div>

  <div class="steps">
    <div class="step active" id="step1"><span class="step-icon">🔐</span> Extracting authorization code</div>
    <div class="step" id="step2"><span class="step-icon">🔄</span> Exchanging code for access token</div>
    <div class="step" id="step3"><span class="step-icon">✅</span> Securing session</div>
    <div class="step" id="step4"><span class="step-icon">🚀</span> Launching dashboard</div>
  </div>

  <div class="error-box" id="errorBox"></div>
  <button class="btn-retry" id="retryBtn" onclick="window.location.href='/'">← Back to Login</button>
</div>

<script>
  const steps = ['step1','step2','step3','step4'];

  function setStep(n, state) {
    const el = document.getElementById(steps[n]);
    el.className = 'step ' + state;
    if (state === 'done') el.querySelector('.step-icon').textContent = '✓';
    if (state === 'error') el.querySelector('.step-icon').textContent = '✗';
  }

  function showError(msg) {
    document.getElementById('spinner').style.display = 'none';
    const box = document.getElementById('errorBox');
    box.style.display = 'block';
    box.textContent = 'Error: ' + msg;
    document.getElementById('retryBtn').style.display = 'inline-block';
    document.getElementById('statusMsg').textContent = 'Authentication failed.';
  }

  function setMsg(msg) {
    document.getElementById('statusMsg').textContent = msg;
  }

  async function handleCallback() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const error = params.get('error');

    if (error) { setStep(0, 'error'); showError(error + ': ' + params.get('error_description')); return; }
    if (!code) {
      // Legacy Deriv OAuth appends token directly
      const hashParams = new URLSearchParams(window.location.hash.slice(1));
      const token = hashParams.get('token1') || params.get('token1');
      if (token) {
        setStep(0, 'done'); setStep(1, 'done'); setStep(2, 'done');
        setMsg('Token received directly...');
        sessionStorage.setItem('deriv_token', token);
        const accounts = [];
        for (let i = 1; i <= 5; i++) {
          const t = hashParams.get('token' + i) || params.get('token' + i);
          const acct = hashParams.get('acct' + i) || params.get('acct' + i);
          const cur = hashParams.get('cur' + i) || params.get('cur' + i);
          if (t && acct) accounts.push({ token: t, account: acct, currency: cur });
        }
        if (accounts.length) sessionStorage.setItem('deriv_accounts', JSON.stringify(accounts));
        setStep(3, 'active');
        setMsg('Launching dashboard...');
        setTimeout(() => { window.location.href = '/dashboard.html'; }, 800);
        return;
      }
      setStep(0, 'error');
      showError('No authorization code or token received. Please try again.');
      return;
    }

    setStep(0, 'done');
    setStep(1, 'active');
    setMsg('Exchanging authorization code...');

    const verifier = sessionStorage.getItem('pkce_verifier');

    try {
      const resp = await fetch('/.netlify/functions/exchange-token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          code,
          code_verifier: verifier,
          redirect_uri: 'https://princefx26.netlify.app/callback'
        })
      });

      const data = await resp.json();
      if (!resp.ok || data.error) throw new Error(data.error || 'Token exchange failed');

      setStep(1, 'done');
      setStep(2, 'active');
      setMsg('Securing session...');

      sessionStorage.setItem('deriv_token', data.access_token);
      if (data.accounts) sessionStorage.setItem('deriv_accounts', JSON.stringify(data.accounts));

      await new Promise(r => setTimeout(r, 400));
      setStep(2, 'done');
      setStep(3, 'active');
      setMsg('Launching dashboard...');
      await new Promise(r => setTimeout(r, 600));
      setStep(3, 'done');

      window.location.href = '/dashboard.html';
    } catch (err) {
      setStep(1, 'error');
      showError(err.message);
    }
  }

  handleCallback();
</script>
</body>
</html>
